<title>GaitWay - CCU Ambulation</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:#0e1a20;color:#eaf0f2;overscroll-behavior:none}
  #app{display:flex;flex-direction:column;height:100vh}
  header{padding:10px 14px;background:#0C8583;color:#fff;display:flex;align-items:center;gap:10px;flex:none}
  header h1{font-size:15px;margin:0;font-weight:700;flex:1}
  header .sub{font-size:11px;opacity:.85;font-weight:400}
  #map{flex:1;position:relative;overflow:hidden;background:#0e1a20;touch-action:none}
  #svg{position:absolute;left:0;top:0;transform-origin:0 0}
  .readout{flex:none;background:#122530;border-top:1px solid #1f3b48;padding:10px 14px}
  .big{display:flex;gap:14px;align-items:baseline}
  .big .d{font-size:34px;font-weight:800;color:#5fd0cc;line-height:1}
  .big .u{font-size:15px;color:#8fa6ae}
  .big .g{margin-left:auto;text-align:right}
  .big .g b{font-size:20px;color:#eaf0f2}
  .big .g span{font-size:11px;color:#8fa6ae;display:block}
  .route{font-size:12px;color:#9fb4bc;margin-top:6px;min-height:16px;word-break:break-word}
  .btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  button{border:none;border-radius:10px;padding:11px 12px;font-size:14px;font-weight:700;cursor:pointer;flex:1;min-width:70px}
  .b-start{background:#0C8583;color:#fff}
  .b-stop{background:#E07B2E;color:#fff}
  .b-undo{background:#26414d;color:#dfe9ec}
  .b-reset{background:#26414d;color:#dfe9ec}
  .b-copy{background:#2f6f4f;color:#fff;flex-basis:100%}
  .adj{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px;color:#9fb4bc}
  .adj button{flex:none;width:40px;padding:8px 0;background:#26414d;color:#fff;font-size:18px}
  .pill{position:absolute;top:8px;left:8px;background:rgba(18,37,48,.9);border:1px solid #1f3b48;border-radius:20px;padding:5px 12px;font-size:12px;color:#9fb4bc;z-index:3}
  .toast{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:#26414d;color:#fff;padding:8px 14px;border-radius:20px;font-size:12px;opacity:0;transition:opacity .25s;z-index:5;pointer-events:none;white-space:nowrap}
  .toast.on{opacity:1}
  .units{font-size:12px;color:#fff;opacity:.9;background:rgba(255,255,255,.15);border-radius:14px;padding:4px 10px;cursor:pointer}
  .legend{position:absolute;bottom:8px;right:8px;background:rgba(18,37,48,.9);border:1px solid #1f3b48;border-radius:8px;padding:6px 9px;font-size:10.5px;color:#9fb4bc;z-index:3;line-height:1.5}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
</style></head>
<body><div id="app">
  <header>
    <div>
      <h1>GaitWay</h1>
      <div class="sub">CCU ambulation - tap Start, the route, then Stop</div>
    </div>
    <div class="units" id="units">feet</div>
  </header>
  <div id="map">
    <svg id="svg"></svg>
    <div class="pill" id="pill">Tap <b>Start</b>, then tap where the walk began</div>
    <div class="legend"><i style="background:#3b6ea5"></i>room &nbsp;<i style="background:#E07B2E"></i>junction &nbsp;<i style="background:#7b8a92"></i>landmark</div>
    <div class="toast" id="toast"></div>
  </div>
  <div class="readout">
    <div class="big">
      <div class="d" id="dist">0</div><div class="u" id="unit">ft</div>
      <div class="g"><b id="gait">--</b><span>gait speed (m/s)</span></div>
    </div>
    <div class="route" id="routetxt">No walk started.</div>
    <div class="adj" id="adjrow" style="display:none">
      manual adjust:
      <button id="minus">-</button><span id="adjval">0 ft</span><button id="plus">+</button>
      <span style="margin-left:auto">timer: <b id="timer">0:00</b></span>
    </div>
    <div class="btns">
      <button class="b-start" id="start">Start</button>
      <button class="b-undo" id="undo">Undo</button>
      <button class="b-stop" id="stop">Stop</button>
      <button class="b-reset" id="reset">Reset</button>
    </div>
    <div class="btns"><button class="b-copy" id="copy">Copy for charting</button></div>
  </div>
</div>
<script>
const G={"nodes":{"WIN":{"x":0,"y":0,"t":"landmark","label":"Window"},"ELEV":{"x":9.5,"y":0,"t":"landmark","label":"Elevators"},"CA":{"x":24,"y":0,"t":"junction","label":"Corner A"},"NEND2":{"x":24,"y":18,"t":"landmark","label":"north end"},"JB":{"x":24,"y":-35,"t":"junction","label":"Jct B"},"PHARM":{"x":29,"y":-35,"t":"landmark","label":"Pharmacy"},"CCU4":{"x":81,"y":-35,"t":"room","label":"CCU4"},"JC":{"x":87,"y":-35,"t":"junction","label":"Jct C"},"CCU3":{"x":95,"y":-35,"t":"room","label":"CCU3"},"CCU2":{"x":87,"y":-60,"t":"room","label":"CCU2"},"CCU1":{"x":87,"y":-68,"t":"room","label":"CCU1"},"JD":{"x":87,"y":-80,"t":"junction","label":"Jct D"},"NST":{"x":87,"y":-84,"t":"landmark","label":"Nurses Stn"},"JP":{"x":87,"y":-131,"t":"junction","label":"Jct P"},"R2214":{"x":112,"y":-80,"t":"room","label":"2214"},"R2216":{"x":130,"y":-80,"t":"room","label":"2216"},"R2218":{"x":143,"y":-80,"t":"room","label":"2218"},"R2220":{"x":160,"y":-80,"t":"room","label":"2220"},"JE":{"x":168,"y":-80,"t":"junction","label":"Jct E"},"R5EAST":{"x":181,"y":-80,"t":"landmark","label":"east wall"},"JI":{"x":48,"y":-80,"t":"junction","label":"Jct I"},"JH":{"x":-17,"y":-80,"t":"junction","label":"Jct H"},"JM":{"x":-56,"y":-80,"t":"junction","label":"Jct M"},"JN":{"x":-76,"y":-80,"t":"junction","label":"Jct N"},"JBS":{"x":24,"y":-80,"t":"junction","label":"Jct B-South"},"NWALL":{"x":168,"y":-63,"t":"landmark","label":"north wall"},"R2224":{"x":168,"y":-100,"t":"room","label":"2224"},"R2226":{"x":168,"y":-111,"t":"room","label":"2226"},"R2228":{"x":168,"y":-126,"t":"room","label":"2228"},"JF":{"x":168,"y":-131,"t":"junction","label":"Jct F"},"R2222":{"x":172,"y":-80,"t":"room","label":"2222"},"R2234":{"x":136,"y":-131,"t":"room","label":"2234"},"R2236":{"x":125,"y":-131,"t":"room","label":"2236"},"R2238":{"x":106,"y":-131,"t":"room","label":"2238"},"R2240":{"x":96,"y":-131,"t":"room","label":"2240"},"R2242":{"x":77,"y":-131,"t":"room","label":"2242"},"R2244":{"x":67,"y":-131,"t":"room","label":"2244"},"JG":{"x":48,"y":-131,"t":"room","label":"2246 / Jct G"},"R2248":{"x":38,"y":-131,"t":"room","label":"2248"},"R2250":{"x":19,"y":-131,"t":"room","label":"2250"},"R2252":{"x":8,"y":-131,"t":"room","label":"2252"},"VEND":{"x":-12,"y":-131,"t":"landmark","label":"Vending"},"JCAFE":{"x":-22,"y":-131,"t":"junction","label":"Jct (cafeteria)"},"JJ":{"x":-56,"y":-131,"t":"junction","label":"Jct J"},"JK":{"x":-76,"y":-131,"t":"junction","label":"Jct K"},"ANTE":{"x":168,"y":-141,"t":"junction","label":"anteroom"},"R2232":{"x":158,"y":-141,"t":"room","label":"2232"},"R2230":{"x":178,"y":-141,"t":"room","label":"2230"},"ELEVW":{"x":-56,"y":-105,"t":"landmark","label":"Elevators (2)"},"DEADEND":{"x":-76,"y":-221,"t":"landmark","label":"dead end"},"CAFE":{"x":-22,"y":-158,"t":"landmark","label":"Cafeteria"},"JCAFN":{"x":-22,"y":-80,"t":"junction","label":"Jct (caf-north)"}},"edges":[["WIN","ELEV",9.5],["ELEV","CA",14.5],["NEND2","CA",18],["CA","JB",35],["JB","PHARM",5],["PHARM","CCU4",52],["CCU4","JC",6],["JC","CCU3",8],["JC","CCU2",25],["CCU2","CCU1",8],["CCU1","JD",12],["JD","NST",4],["NST","JP",47],["JD","R2214",25],["R2214","R2216",18],["R2216","R2218",13],["R2218","R2220",17],["R2220","JE",8],["JE","R5EAST",13],["JD","JI",84],["JI","JH",20],["JH","JM",39],["JM","JN",20],["JB","JBS",45],["JI","JBS",24],["JBS","JH",41],["NWALL","JE",17],["JE","R2224",20],["R2224","R2226",11],["R2226","R2228",15],["R2228","JF",5],["JE","R2222",1],["JF","R2234",32],["R2234","R2236",11],["R2236","R2238",19],["R2238","R2240",10],["R2240","JP",9],["JP","R2242",10],["R2242","R2244",10],["R2244","JG",19],["JG","R2248",10],["R2248","R2250",19],["R2250","R2252",11],["R2252","VEND",20],["VEND","JCAFE",10],["JCAFE","JJ",34],["JJ","JK",20],["JF","ANTE",10],["ANTE","R2232",10],["ANTE","R2230",10],["JG","JI",30],["JJ","JM",30],["JJ","ELEVW",26],["JK","JN",30],["JK","DEADEND",90],["JCAFE","CAFE",27],["JCAFE","JCAFN",51],["JM","JCAFN",34],["JCAFN","JH",5]]};
const N=G.nodes, E=G.edges;
// adjacency
const adj={};
for(const id in N) adj[id]={};
for(const [a,b,f] of E){ adj[a][b]=f; adj[b][a]=f; }

// ---- layout: fit node coords to screen ----
const svg=document.getElementById('svg'), map=document.getElementById('map');
let xs=Object.values(N).map(n=>n.x), ys=Object.values(N).map(n=>n.y);
const minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);
const FW=maxx-minx, FH=maxy-miny;
let scale=1, ox=0, oy=0;
function fit(){
  const w=map.clientWidth, h=map.clientHeight, pad=46;
  scale=Math.min((w-pad*2)/FW,(h-pad*2)/FH);
  ox=(w-FW*scale)/2 - minx*scale;
  oy=(h-FH*scale)/2 + maxy*scale;   // flip y
  draw();
}
function SX(x){return x*scale+ox;}
function SY(y){return -y*scale+oy;}   // north up

// ---- state ----
let route=[];      // node ids in walk order
let started=false, adjust=0, t0=null, tEnd=null, tick=null;

function edgesBetweenAdjacent(a,b){ return adj[a] && adj[a][b]!=null ? adj[a][b] : null; }

// shortest path (Dijkstra) between two nodes, returns {dist,path}
function sp(src,dst){
  const D={},P={},seen={}; D[src]=0;
  const pq=[[0,src]];
  while(pq.length){
    pq.sort((x,y)=>x[0]-y[0]); const [d,u]=pq.shift();
    if(seen[u])continue; seen[u]=1;
    if(u===dst)break;
    for(const v in adj[u]){ const nd=d+adj[u][v];
      if(nd<(D[v]??1e9)){ D[v]=nd; P[v]=u; pq.push([nd,v]); } }
  }
  if(D[dst]==null)return null;
  const path=[dst]; while(path[0]!==src)path.unshift(P[path[0]]);
  return {dist:D[dst],path};
}

// total distance = sum of shortest paths between consecutive tapped waypoints
function totalFeet(){
  let s=0;
  for(let i=0;i<route.length-1;i++){ const r=sp(route[i],route[i+1]); if(r)s+=r.dist; }
  return s+adjust;
}
// full expanded node path (through auto-filled intermediate nodes)
function fullPath(){
  if(route.length===0)return [];
  let out=[route[0]];
  for(let i=0;i<route.length-1;i++){ const r=sp(route[i],route[i+1]); if(r)out=out.concat(r.path.slice(1)); }
  return out;
}

function draw(){
  const parts=[];
  // corridors (edges)
  for(const [a,b] of E){
    parts.push(`<line x1="${SX(N[a].x)}" y1="${SY(N[a].y)}" x2="${SX(N[b].x)}" y2="${SY(N[b].y)}" stroke="#24404c" stroke-width="7" stroke-linecap="round"/>`);
  }
  // highlight walked path
  const fp=fullPath();
  for(let i=0;i<fp.length-1;i++){
    const a=fp[i],b=fp[i+1];
    parts.push(`<line x1="${SX(N[a].x)}" y1="${SY(N[a].y)}" x2="${SX(N[b].x)}" y2="${SY(N[b].y)}" stroke="#5fd0cc" stroke-width="7" stroke-linecap="round"/>`);
  }
  // nodes
  const col={room:'#3b6ea5',junction:'#E07B2E',landmark:'#7b8a92'};
  for(const id in N){
    const n=N[id], sx=SX(n.x), sy=SY(n.y);
    const r=n.t==='room'?8.5:(n.t==='junction'?6:5.5);
    const on=route.includes(id);
    parts.push(`<circle data-id="${id}" cx="${sx}" cy="${sy}" r="${on?r+3:r}" fill="${on?'#5fd0cc':col[n.t]}" stroke="${on?'#fff':'#0e1a20'}" stroke-width="2"/>`);
    if(n.t==='room'||on){
      parts.push(`<text x="${sx}" y="${sy-11}" fill="#cfe0e5" font-size="9" text-anchor="middle" font-weight="600" pointer-events="none">${n.label}</text>`);
    }
  }
  // order badges on tapped waypoints
  route.forEach((id,i)=>{ const n=N[id];
    parts.push(`<circle cx="${SX(n.x)+11}" cy="${SY(n.y)-11}" r="7" fill="#E07B2E" pointer-events="none"/>`);
    parts.push(`<text x="${SX(n.x)+11}" y="${SY(n.y)-8}" fill="#fff" font-size="9" text-anchor="middle" font-weight="700" pointer-events="none">${i+1}</text>`);
  });
  svg.innerHTML=parts.join('');
  svg.setAttribute('width',map.clientWidth); svg.setAttribute('height',map.clientHeight);
  render();
}

let useMeters=false;
function fmt(ft){ return useMeters ? (ft*0.3048).toFixed(1) : Math.round(ft); }
function render(){
  const ft=started?totalFeet():0;
  document.getElementById('dist').textContent=fmt(ft);
  document.getElementById('unit').textContent=useMeters?'m':'ft';
  // gait speed
  let g='--';
  if(tEnd&&t0){ const secs=(tEnd-t0)/1000; if(secs>2){ g=((ft*0.3048)/secs).toFixed(2); } }
  document.getElementById('gait').textContent=g;
  document.getElementById('adjval').textContent=(adjust>=0?'+':'')+adjust+' ft';
  // route text
  const fp=fullPath();
  const rt=document.getElementById('routetxt');
  if(!started){ rt.textContent='No walk started.'; }
  else if(route.length<1){ rt.textContent='Tap where the walk began.'; }
  else { rt.textContent = route.map(id=>N[id].label).join('  \u2192  '); }
}

// ---- interactions ----
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('on'),1400); }
function nearest(px,py){
  let best=null,bd=1e9;
  for(const id in N){ const dx=SX(N[id].x)-px, dy=SY(N[id].y)-py, d=dx*dx+dy*dy; if(d<bd){bd=d;best=id;} }
  return bd<32*32? best : null;
}
map.addEventListener('click',ev=>{
  if(moved) return;                       // was a drag/pinch, not a tap
  if(!started){ toast('Tap Start first'); return; }
  const rect=map.getBoundingClientRect();
  // undo the view transform to get base-layout coords
  const px=(ev.clientX-rect.left - view.x)/view.k;
  const py=(ev.clientY-rect.top  - view.y)/view.k;
  const id=nearest(px, py);
  if(!id)return;
  if(route.length && route[route.length-1]===id){ toast('Already there'); return; }
  route.push(id);
  if(route.length===1){ t0=Date.now(); startTimer(); document.getElementById('pill').style.display='none'; }
  draw();
});
function startTimer(){ document.getElementById('adjrow').style.display='flex';
  tick=setInterval(()=>{ if(t0&&!tEnd){ const s=Math.floor((Date.now()-t0)/1000);
    document.getElementById('timer').textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); } },500);
}
document.getElementById('start').onclick=()=>{ started=true; route=[]; adjust=0; t0=null; tEnd=null;
  document.getElementById('pill').style.display='block';
  document.getElementById('pill').innerHTML='Now tap where the walk <b>began</b>'; draw(); toast('Tap the start room'); };
document.getElementById('stop').onclick=()=>{ if(!started||route.length<2){toast('Tap at least start + end');return;}
  tEnd=Date.now(); clearInterval(tick); render(); toast('Walk complete'); };
document.getElementById('undo').onclick=()=>{ if(route.length){ route.pop(); draw(); } };
document.getElementById('reset').onclick=()=>{ started=false; route=[]; adjust=0; t0=null; tEnd=null; clearInterval(tick);
  document.getElementById('adjrow').style.display='none';
  document.getElementById('timer').textContent='0:00';
  document.getElementById('pill').style.display='block';
  document.getElementById('pill').innerHTML='Tap <b>Start</b>, then tap where the walk began'; draw(); };
document.getElementById('plus').onclick=()=>{ adjust+=5; render(); };
document.getElementById('minus').onclick=()=>{ adjust-=5; render(); };
document.getElementById('units').onclick=document.getElementById('units').ontouchend=()=>{ useMeters=!useMeters;
  document.getElementById('units').textContent=useMeters?'meters':'feet'; render(); };
document.getElementById('copy').onclick=()=>{
  if(!started||route.length<2){toast('Complete a walk first');return;}
  const ft=totalFeet(), m=(ft*0.3048).toFixed(1);
  let secs = (tEnd&&t0)? Math.round((tEnd-t0)/1000):null;
  let g = (tEnd&&t0&&secs>2)? ((ft*0.3048)/secs).toFixed(2):null;
  const from=N[route[0]].label, to=N[route[route.length-1]].label;
  let s=`Ambulation: ${Math.round(ft)} ft (${m} m), ${from} \u2192 ${to}`;
  if(secs){ s+=`; time ${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`; }
  if(g){ s+=`; gait speed ${g} m/s`; }
  const done=()=>toast('Copied for Epic');
  if(navigator.clipboard){ navigator.clipboard.writeText(s).then(done,()=>fallback(s)); } else fallback(s);
  function fallback(t){ const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');done();}catch(e){} ta.remove(); }
};
// ---- pan / zoom via a view transform on #svg; taps still select nodes ----
let view={k:1,x:0,y:0};        // applied on top of the fit() layout
function applyView(){ svg.style.transform=`translate(${view.x}px,${view.y}px) scale(${view.k})`; svg.style.transformOrigin='0 0'; }
function zoomAt(cx,cy,factor){
  const nk=Math.min(6,Math.max(1,view.k*factor));   // never smaller than full-map fit
  view.x = cx-(cx-view.x)*(nk/view.k);
  view.y = cy-(cy-view.y)*(nk/view.k);
  view.k = nk; applyView();
}
let pts=new Map(), lastDist=null, moved=false, downXY=null;
map.addEventListener('pointerdown',e=>{ map.setPointerCapture(e.pointerId); pts.set(e.pointerId,{x:e.clientX,y:e.clientY}); moved=false; downXY=[e.clientX,e.clientY]; });
map.addEventListener('pointermove',e=>{
  if(!pts.has(e.pointerId))return;
  const prev=pts.get(e.pointerId); pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(downXY && Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1])>8) moved=true;
  if(pts.size===1){                     // drag pan
    view.x += e.clientX-prev.x; view.y += e.clientY-prev.y; applyView();
  } else if(pts.size===2){              // pinch zoom
    const a=[...pts.values()]; const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
    if(lastDist){ const r=map.getBoundingClientRect();
      const cx=(a[0].x+a[1].x)/2-r.left, cy=(a[0].y+a[1].y)/2-r.top;
      zoomAt(cx,cy,d/lastDist); }
    lastDist=d;
  }
});
function endPtr(e){ pts.delete(e.pointerId); if(pts.size<2) lastDist=null; }
map.addEventListener('pointerup',endPtr); map.addEventListener('pointercancel',endPtr);
map.addEventListener('wheel',e=>{ e.preventDefault(); const r=map.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top, e.deltaY<0?1.12:0.9); },{passive:false});
// double-tap to reset to full map
let lastTap=0;
map.addEventListener('pointerup',e=>{ const now=Date.now(); if(now-lastTap<300 && !moved){ view={k:1,x:0,y:0}; applyView(); } lastTap=now; });
window.addEventListener('resize',()=>{ fit(); view={k:1,x:0,y:0}; applyView(); });
fit(); applyView();
// seed a couple of hint labels always for orientation
</script>
</body></html>
