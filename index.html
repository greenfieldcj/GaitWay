<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:#0e1a20;color:#eaf0f2;overscroll-behavior:none}
  #app{display:flex;flex-direction:column;height:100dvh}
  header{padding:8px 14px;background:#0C8583;color:#fff;display:flex;align-items:center;gap:10px;flex:none}
  header h1{font-size:15px;margin:0;font-weight:700}
  header .sub{font-size:11px;opacity:.85}
  header .u{margin-left:auto;font-size:12px;background:rgba(255,255,255,.16);border-radius:14px;padding:5px 11px;cursor:pointer}
  #map{flex:1;position:relative;overflow:hidden;background:#0e1a20;touch-action:none}
  #vp{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
  #plan{display:block;background:#fff}
  .pill{position:absolute;top:8px;left:8px;right:8px;margin:auto;width:max-content;max-width:92%;background:rgba(18,37,48,.92);border:1px solid #24404c;border-radius:18px;padding:6px 13px;font-size:12.5px;color:#cfe0e5;z-index:4;text-align:center}
  .readout{flex:none;background:#122530;border-top:1px solid #1f3b48;padding:9px 14px calc(9px + env(safe-area-inset-bottom))}
  .big{display:flex;gap:14px;align-items:baseline}
  .big .d{font-size:32px;font-weight:800;color:#5fd0cc;line-height:1}
  .big .u{font-size:14px;color:#8fa6ae}
  .big .g{margin-left:auto;text-align:right}
  .big .g b{font-size:19px;color:#eaf0f2}
  .big .g span{font-size:10.5px;color:#8fa6ae;display:block}
  .route{font-size:12px;color:#9fb4bc;margin-top:5px;min-height:15px;word-break:break-word}
  .adj{display:flex;align-items:center;gap:8px;margin-top:7px;font-size:12.5px;color:#9fb4bc}
  .adj button{flex:none;width:38px;padding:7px 0;background:#26414d;color:#fff;font-size:17px;border:none;border-radius:9px}
  .btns{display:flex;gap:7px;margin-top:8px}
  button{border:none;border-radius:10px;padding:11px 8px;font-size:14px;font-weight:700;cursor:pointer;flex:1}
  .b-start{background:#0C8583;color:#fff}.b-stop{background:#E07B2E;color:#fff}
  .b-undo,.b-reset{background:#26414d;color:#dfe9ec}
  .b-copy{background:#2f6f4f;color:#fff;width:100%;margin-top:7px}
  .toast{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:#26414d;color:#fff;padding:8px 14px;border-radius:20px;font-size:12px;opacity:0;transition:opacity .25s;z-index:6;pointer-events:none;white-space:nowrap}
  .toast.on{opacity:1}
  .zbtns{position:absolute;bottom:10px;right:10px;display:flex;flex-direction:column;gap:6px;z-index:4}
  .zbtns button{width:40px;height:40px;border-radius:10px;background:rgba(18,37,48,.92);color:#fff;border:1px solid #24404c;font-size:18px;font-weight:700}
</style></head>

abel":"2244"},"JG":{"x":48,"y":-131,"t":"room","label":"2246 / Jct G"},"R2248":{"x":38,"y":-131,"t":"room","label":"2248"},"R2250":{"x":19,"y":-131,"t":"room","label":"2250"},"R2252":{"x":8,"y":-131,"t":"room","label":"2252"},"VEND":{"x":-12,"y":-131,"t":"landmark","label":"Vending"},"JCAFE":{"x":-22,"y":-131,"t":"landmark","label":"Cafeteria"},"JJ":{"x":-56,"y":-131,"t":"junction","label":"Jct J"},"JK":{"x":-76,"y":-131,"t":"junction","label":"Jct K"},"ANTE":{"x":168,"y":-141,"t":"junction","label":"anteroom"},"R2232":{"x":158,"y":-141,"t":"room","label":"2232"},"R2230":{"x":178,"y":-141,"t":"room","label":"2230"},"ELEVW":{"x":-56,"y":-105,"t":"landmark","label":"Elevators (2)"},"DEADEND":{"x":-76,"y":-221,"t":"landmark","label":"dead end"},"JCAFN":{"x":-22,"y":-80,"t":"junction","label":"Jct (caf-north)"}},"edges":[["WIN","ELEV",9.5],["ELEV","CA",14.5],["NEND2","CA",18],["CA","JB",35],["JB","PHARM",5],["PHARM","CCU4",52],["CCU4","JC",6],["JC","CCU3",8],["JC","CCU2",25],["CCU2","CCU1",8],["CCU1","JD",12],["JD","NST",4],["NST","JP",47],["JD","R2214",25],["R2214","R2216",18],["R2216","R2218",13],["R2218","R2220",17],["R2220","JE",8],["JE","R5EAST",13],["JD","JI",84],["JI","JH",20],["JH","JM",39],["JM","JN",20],["JB","JBS",45],["JI","JBS",24],["JBS","JH",41],["NWALL","JE",17],["JE","R2224",20],["R2224","R2226",11],["R2226","R2228",15],["R2228","JF",5],["JE","R2222",1],["JF","R2234",32],["R2234","R2236",11],["R2236","R2238",19],["R2238","R2240",10],["R2240","JP",9],["JP","R2242",10],["R2242","R2244",10],["R2244","JG",19],["JG","R2248",10],["R2248","R2250",19],["R2250","R2252",11],["R2252","VEND",20],["VEND","JCAFE",10],["JCAFE","JJ",34],["JJ","JK",20],["JF","ANTE",10],["ANTE","R2232",10],["ANTE","R2230",10],["JG","JI",30],["JJ","JM",30],["JJ","ELEVW",26],["JK","JN",30],["JK","DEADEND",90],["JCAFE","JCAFN",51],["JM","JCAFN",34],["JCAFN","JH",5]]}, N=G.nodes, E=G.edges;
// coordinate transform: feet <-> svg user units (must match the diagram)
const PAD=40, SC=3.4, XS0=-100, YS1=30;
function fx2sx(fx){ return PAD+(fx-XS0)*SC; }
function fy2sy(fy){ return 100+(YS1-fy)*SC; }
function sx2fx(sx){ return (sx-PAD)/SC+XS0; }
function sy2fy(sy){ return YS1-(sy-100)/SC; }

// adjacency (base graph)
const adj={}; for(const id in N) adj[id]={};
for(const [a,b,f] of E){ adj[a][b]=f; adj[b][a]=f; }

const svg=document.getElementById('plan'), overlay=document.getElementById('overlay');
const map=document.getElementById('map'), vp=document.getElementById('vp');
const PLAN_W=1100, HPX=1024;

// ---- reference dots on the diagram ----
function drawDots(){
  const col={room:'#2f6f4f',junction:'#E07B2E',landmark:'#5a6b73'};
  let s='';
  for(const id in N){ const n=N[id];
    // small dots; rooms are already labeled on the plan, so keep dots subtle
    s+=`<circle cx="${fx2sx(n.x)}" cy="${fy2sy(n.y)}" r="4.5" fill="${n.t==='junction'?'#E07B2E':'#356'}" fill-opacity="0.0"/>`;
  }
  overlay.innerHTML=s+renderRoute();
}

// ---- view (fit + pan/zoom) ----
let view={k:1,x:0,y:0}, minK=1;
function fit(){
  const w=map.clientWidth, h=map.clientHeight;
  if(!w||!h){ requestAnimationFrame(fit); return; }
  const k=Math.min(w/PLAN_W, h/HPX);
  minK=k; view.k=k;
  view.x=(w-PLAN_W*k)/2; view.y=(h-HPX*k)/2;
  apply();
}
function apply(){ vp.style.transform=`translate(${view.x}px,${view.y}px) scale(${view.k})`; }
function zoomAt(cx,cy,f){ const nk=Math.min(minK*7,Math.max(minK,view.k*f));
  view.x=cx-(cx-view.x)*(nk/view.k); view.y=cy-(cy-view.y)*(nk/view.k); view.k=nk; apply(); }

// screen -> svg user coords
function screenToSvg(clientX,clientY){
  const r=map.getBoundingClientRect();
  const mx=clientX-r.left, my=clientY-r.top;
  return { x:(mx-view.x)/view.k, y:(my-view.y)/view.k };
}

// ---- project a feet-point onto nearest edge; return {a,b,t,feet_from_a,fx,fy,dist} ----
function projectToWalkway(fx,fy){
  let best=null;
  for(const [a,b,feet] of E){
    const ax=N[a].x,ay=N[a].y,bx=N[b].x,by=N[b].y;
    const dx=bx-ax,dy=by-ay, L2=dx*dx+dy*dy;
    let t = L2? ((fx-ax)*dx+(fy-ay)*dy)/L2 : 0; t=Math.max(0,Math.min(1,t));
    const px=ax+t*dx, py=ay+t*dy;
    const d=Math.hypot(fx-px,fy-py);
    if(!best||d<best.d){ best={a,b,feet,t,px,py,d}; }
  }
  return best;
}

// ---- distance between two projected waypoints, routed through nodes ----
function edgeFeet(a,b){ return adj[a] && adj[a][b]!=null ? adj[a][b] : null; }
function dijkstra(src,dst,extra){
  // extra: optional {node:{nbr:feet}} adjacency additions
  const A={}; for(const k in adj){ A[k]=Object.assign({},adj[k]); }
  if(extra){ for(const u in extra){ A[u]=A[u]||{}; for(const v in extra[u]){ A[u][v]=extra[u][v]; A[v]=A[v]||{}; A[v][u]=extra[u][v]; } } }
  const D={[src]:0}, P={}, seen={}, pq=[[0,src]];
  while(pq.length){ pq.sort((x,y)=>x[0]-y[0]); const [d,u]=pq.shift();
    if(seen[u])continue; seen[u]=1; if(u===dst)break;
    for(const v in A[u]){ const nd=d+A[u][v]; if(nd<(D[v]??1e9)){ D[v]=nd; P[v]=u; pq.push([nd,v]); } } }
  if(D[dst]==null)return null;
  const path=[dst]; while(path[0]!==src)path.unshift(P[path[0]]);
  return {dist:D[dst],path};
}
// distance between waypoint W1 and W2 (each a projection on an edge)
function segDist(w1,w2){

  if((w1.a===w2.a&&w1.b===w2.b)||(w1.a===w2.b&&w1.b===w2.a)){
    return Math.abs(w1.t-w2.t)*w1.feet;
  }
  // temp nodes T1 on (w1.a,w1.b), T2 on (w2.a,w2.b)
  const extra={T1:{}, T2:{}};
  extra.T1[w1.a]=w1.t*w1.feet; extra.T1[w1.b]=(1-w1.t)*w1.feet;
  extra.T2[w2.a]=w2.t*w2.feet; extra.T2[w2.b]=(1-w2.t)*w2.feet;
  const r=dijkstra('T1','T2',extra);
  return r? r.dist : 0;
}

// ---- walk state ----
let started=false, wpts=[], adjust=0, t0=null, tEnd=null, tick=null, useMeters=false;
let laps=[], lastRoute=null;   // laps: [{feet,secs}]; lastRoute: saved wpts for 'repeat'
function lapTotals(){ let ft=0,sec=0; for(const L of laps){ ft+=L.feet; sec+=L.secs; } return {ft,sec}; }
function totalFeet(){ let s=0; for(let i=0;i<wpts.length-1;i++) s+=segDist(wpts[i],wpts[i+1]); return s+adjust; }

function renderRoute(){
  let s='';
  // draw tapped waypoints and connecting highlighted path (approx: straight between projected pts along edges)
  for(let i=0;i<wpts.length;i++){ const w=wpts[i];
    s+=`<circle cx="${fx2sx(w.px)}" cy="${fy2sy(w.py)}" r="7" fill="#5fd0cc" stroke="#0e1a20" stroke-width="2"/>`;
    s+=`<circle cx="${fx2sx(w.px)+9}" cy="${fy2sy(w.py)-9}" r="6.5" fill="#E07B2E"/>`;
    s+=`<text x="${fx2sx(w.px)+9}" y="${fy2sy(w.py)-6}" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">${i+1}</text>`;
  }
  return s;
}
function refresh(){ overlay.innerHTML=renderRoute(); render(); }

function render(){
  const ft=started?totalFeet():0;
  document.getElementById('dist').textContent=useMeters?(ft*0.3048).toFixed(1):Math.round(ft);
  document.getElementById('unit').textContent=useMeters?'m':'ft';
  let g='--'; if(tEnd&&t0){ const s=(tEnd-t0)/1000; if(s>2) g=((ft*0.3048)/s).toFixed(2); }
  document.getElementById('gait').textContent=g;
  document.getElementById('adjval').textContent=(adjust>=0?'+':'')+adjust+' ft';
  const rt=document.getElementById('routetxt');
  let base = !started?'No walk started.' : (wpts.length? `${wpts.length} point${wpts.length>1?'s':''} tapped` : 'Tap where the walk began.');
  if(laps.length){ const T=lapTotals(); const tf=useMeters?(T.ft*0.3048).toFixed(1)+' m':Math.round(T.ft)+' ft';
    base += `  —  ${laps.length} lap${laps.length>1?'s':''} banked, ${tf} total`; }
  rt.textContent = base;
}

// nearest labeled node to a projected point (for the charting summary wording)
function nearestLabel(w){
  let best=null,bd=1e9;
  for(const id in N){ if(N[id].t==='junction') continue;   // staff-facing: rooms & landmarks only
    const d=Math.hypot(N[id].x-w.px,N[id].y-w.py); if(d<bd){bd=d;best=id;} }
  if(!best){ for(const id in N){ const d=Math.hypot(N[id].x-w.px,N[id].y-w.py); if(d<bd){bd=d;best=id;} } }
  return N[best].label;
}

// ---- interaction ----
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('on'),1400); }
let pts=new Map(), lastDist=null, moved=false, downXY=null;
map.addEventListener('pointerdown',e=>{ map.setPointerCapture(e.pointerId); pts.set(e.pointerId,{x:e.clientX,y:e.clientY}); moved=false; downXY=[e.clientX,e.clientY]; });
map.addEventListener('pointermove',e=>{ if(!pts.has(e.pointerId))return;
  const prev=pts.get(e.pointerId); pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(downXY&&Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1])>8) moved=true;
  if(pts.size===1){ view.x+=e.clientX-prev.x; view.y+=e.clientY-prev.y; apply(); }
  else if(pts.size===2){ const a=[...pts.values()]; const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
    if(lastDist){ const r=map.getBoundingClientRect(); zoomAt((a[0].x+a[1].x)/2-r.left,(a[0].y+a[1].y)/2-r.top,d/lastDist); } lastDist=d; } });
function up(e){ pts.delete(e.pointerId); if(pts.size<2) lastDist=null; }
map.addEventListener('pointerup',up); map.addEventListener('pointercancel',up);
map.addEventListener('click',e=>{
  if(moved)return;
  if(!started){ toast('Tap Start first'); return; }
  const su=screenToSvg(e.clientX,e.clientY);
  const w=projectToWalkway(sx2fx(su.x), sy2fy(su.y));
  if(!w||w.d>18){ toast('Tap on a hallway'); return; }   // must be near a walkway (<18 ft)
  wpts.push(w);
  if(wpts.length===1){ t0=Date.now(); startTimer(); document.getElementById('pill').style.display='none'; }
  refresh();
});
function startTimer(){ document.getElementById('adjrow').style.display='flex';
  tick=setInterval(()=>{ if(t0&&!tEnd){ const s=Math.floor((Date.now()-t0)/1000); document.getElementById('timer').textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); } },500); }

document.getElementById('start').onclick=()=>{ started=true; wpts=[]; adjust=0; t0=null; tEnd=null;
  document.getElementById('pill').style.display='block'; document.getElementById('pill').innerHTML='Now tap where the walk <b>began</b>'; refresh(); toast('Tap the start point'); };
document.getElementById('stop').onclick=()=>{ if(!started||wpts.length<2){toast('Tap at least start + end');return;} tEnd=Date.now(); clearInterval(tick); document.getElementById('laprow').style.display='flex'; render(); toast('Walk complete'); };
document.getElementById('addlap').onclick=()=>{
  if(!wpts.length||wpts.length<2){ toast('Tap a walk first'); return; }
  const secs=(tEnd&&t0)?Math.round((tEnd-t0)/1000):(t0?Math.round((Date.now()-t0)/1000):0);
  laps.push({feet:totalFeet(), secs});
  lastRoute=wpts.slice();
  // reset for the next lap but keep 'started'
  wpts=[]; adjust=0; t0=null; tEnd=null;
  document.getElementById('pill').style.display='block';
  document.getElementById('pill').innerHTML='Lap banked — tap the next route, or <b>Repeat last route</b>';
  refresh(); toast('Lap added');
};
document.getElementById('repeat').onclick=()=>{
  if(!lastRoute){ toast('No previous route yet'); return; }
  wpts=lastRoute.slice(); t0=Date.now(); tEnd=null; adjust=0; startTimer();
  document.getElementById('pill').style.display='none';
  refresh(); toast('Repeated last route — tap Stop when done');
};
document.getElementById('undo').onclick=()=>{ if(wpts.length){ wpts.pop(); refresh(); } };
document.getElementById('reset').onclick=()=>{ started=false; wpts=[]; adjust=0; t0=null; tEnd=null; clearInterval(tick); laps=[]; lastRoute=null; document.getElementById('laprow').style.display='none';
  document.getElementById('adjrow').style.display='none'; document.getElementById('timer').textContent='0:00';
  document.getElementById('pill').style.display='block'; document.getElementById('pill').innerHTML='Tap <b>Start</b>, then tap where the walk began'; refresh(); };
document.getElementById('plus').onclick=()=>{ adjust+=5; render(); };
document.getElementById('minus').onclick=()=>{ adjust-=5; render(); };
document.getElementById('units').onclick=()=>{ useMeters=!useMeters; document.getElementById('units').textContent=useMeters?'meters':'feet'; render(); };
document.getElementById('zin').onclick=()=>{ const r=map.getBoundingClientRect(); zoomAt(r.width/2,r.height/2,1.3); };
document.getElementById('zout').onclick=()=>{ const r=map.getBoundingClientRect(); zoomAt(r.width/2,r.height/2,1/1.3); };
document.getElementById('zfit').onclick=fit;
document.getElementById('copy').onclick=()=>{
  // include any banked laps plus the current (if a valid walk is on screen)
  let ft=0, secs=0, nlaps=laps.length;
  const T=lapTotals(); ft+=T.ft; secs+=T.sec;
  const curValid = started && wpts.length>=2;
  if(curValid){ ft+=totalFeet(); const cs=(tEnd&&t0)?Math.round((tEnd-t0)/1000):(t0?Math.round((Date.now()-t0)/1000):0); secs+=cs; nlaps+=1; }
  if(ft<=0){ toast('Complete a walk first'); return; }
  const m=(ft*0.3048).toFixed(1);
  const g=(secs>2)?((ft*0.3048)/secs).toFixed(2):null;
  let s;
  if(nlaps>1){
    s=`Ambulation: ${nlaps} laps, ${Math.round(ft)} ft (${m} m) total`;
  } else {
    const from=nearestLabel(wpts[0]||lastRoute[0]), to=nearestLabel((wpts.length?wpts:lastRoute)[(wpts.length?wpts:lastRoute).length-1]);
    s=`Ambulation: ${Math.round(ft)} ft (${m} m), ${from} → ${to}`;
  }
  if(secs)s+=`; time ${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
  if(g)s+=`; ${nlaps>1?'avg ':''}gait speed ${g} m/s`;
  const done=()=>toast('Copied for Epic');
  if(navigator.clipboard) navigator.clipboard.writeText(s).then(done,()=>fb(s)); else fb(s);
  function fb(t){ const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');done();}catch(e){} ta.remove(); } };

window.addEventListener('resize',()=>{ fit(); });
if(window.ResizeObserver){ new ResizeObserver(()=>{ if(view.k<=minK+0.001) fit(); }).observe(map); }
drawDots(); requestAnimationFrame(fit); setTimeout(fit,150);
</script>
</body></html>
